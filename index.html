<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ludo Online</title>
  <style>
    body { font-family: Arial; text-align: center; }
    .board { margin: 20px auto; width: 400px; height: 400px; border: 3px solid black; }
    .token { width: 30px; height: 30px; border-radius: 50%; display: inline-block; margin: 5px; }
    .red { background: red; }
    .green { background: green; }
    .yellow { background: yellow; }
    .blue { background: blue; }
  </style>
</head>
<body>
  <h1>Play Ludo Online</h1>
  <div class="board">
    <div class="token red"></div>
    <div class="token green"></div>
    <div class="token yellow"></div>
    <div class="token blue"></div>
  </div>
  <button onclick="rollDice()">Roll Dice</button>
  <p id="result"></p>

  <script>
    let turn = 0;
    const players = ["Red", "Green", "Yellow", "Blue"];

    function rollDice() {
      const roll = Math.floor(Math.random() * 6) + 1;
      document.getElementById("result").innerText =
        players[turn] + " rolled a " + roll;
      // TODO: Add movement logic here
      turn = (turn + 1) % players.length;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ludo Online</title>
  <style>
    body { font-family: Arial; text-align: center; }
    canvas { border: 3px solid black; margin-top: 20px; }
    button { margin-top: 20px; padding: 10px 20px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>Play Ludo Online</h1>
  <canvas id="board" width="600" height="600"></canvas>
  <button onclick="rollDice()">Roll Dice</button>
  <p id="result"></p>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");

    const cellSize = 40;
    const boardSize = 15; // 15x15 grid
    let turn = 0;

    const safeSquares = [0, 8, 13, 21, 26, 34, 39, 47]; // Example safe positions

    const players = [
      { color: "red", path: [], tokens: [-1, -1, -1, -1] },
      { color: "green", path: [], tokens: [-1, -1, -1, -1] },
      { color: "yellow", path: [], tokens: [-1, -1, -1, -1] },
      { color: "blue", path: [], tokens: [-1, -1, -1, -1] }
    ];

    function definePaths() {
      // Simplified straight paths for demo
      players.forEach((player, idx) => {
        player.path = [...Array(57).keys()].map(i => ({
          x: (i % boardSize),
          y: Math.floor(i / boardSize)
        }));
      });
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < boardSize; i++) {
        for (let j = 0; j < boardSize; j++) {
          ctx.strokeRect(i * cellSize, j * cellSize, cellSize, cellSize);
        }
      }
      drawTokens();
    }

    function drawTokens() {
      players.forEach(player => {
        player.tokens.forEach(pos => {
          if (pos >= 0) {
            const step = player.path[pos];
            const x = step.x * cellSize + cellSize / 2;
            const y = step.y * cellSize + cellSize / 2;
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.closePath();
          }
        });
      });
    }

    function rollDice() {
      const roll = Math.floor(Math.random() * 6) + 1;
      document.getElementById("result").innerText =
        players[turn].color.toUpperCase() + " rolled " + roll;

      // Pick first available token for demo
      let moved = false;
      for (let i = 0; i < 4; i++) {
        if (players[turn].tokens[i] === -1 && roll === 6) {
          players[turn].tokens[i] = 0; // Enter board
          moved = true;
          break;
        } else if (players[turn].tokens[i] >= 0) {
          players[turn].tokens[i] += roll;
          if (players[turn].tokens[i] >= players[turn].path.length) {
            players[turn].tokens[i] = players[turn].path.length - 1;
            alert(players[turn].color.toUpperCase() + " finished a token!");
          }
          // Capture check
          capture(players[turn], players[turn].tokens[i]);
          moved = true;
          break;
        }
      }

      if (!moved) {
        document.getElementById("result").innerText += " (no move)";
      }

      turn = (turn + 1) % players.length;
      drawBoard();
    }

    function capture(currentPlayer, pos) {
      players.forEach(player => {
        if (player.color !== currentPlayer.color) {
          player.tokens.forEach((t, idx) => {
            if (t === pos && !safeSquares.includes(pos)) {
              player.tokens[idx] = -1; // Send back to home
              alert(currentPlayer.color.toUpperCase() + " captured " + player.color.toUpperCase() + "!");
            }
          });
        }
      });
    }

    definePaths();
    drawBoard();
  </script>
</body>
</html>
